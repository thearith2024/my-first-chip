# Tiny Tapeout project information
project:
  title:        "My First Blink LED"
  author:       "thearith"
  discord:      ""
  description:  "A simple 24-bit counter LED blinker"
  language:     "Verilog"
  clock_hz:     10000000

  # How many tiles your design occupies
  tiles: "1x1"

  # Top module name
  top_module:  "tt_um_example"
  
  # Source files
  source_files:
    - "project.v"

  # ផ្នែកខាងក្រោមនេះ បើបាត់ វានឹងធ្វើឱ្យ Docs ក្រហម
  how_it_works: "This project uses a 24-bit counter to divide a 10MHz clock, making an LED blink at visible speed."
  how_to_test:  "Apply 10MHz clock to the clk pin, and observe the LED on uo_out[0]."

# Pinout configuration
pinout:
  # Inputs
  ui[0]: "reset"
  ui[1]: "none"
  ui[2]: "none"
  ui[3]: "none"
  ui[4]: "none"
  ui[5]: "none"
  ui[6]: "none"
  ui[7]: "none"

  # Outputs
  uo[0]: "led"
  uo[1]: "none"
  uo[2]: "none"
  uo[3]: "none"
  uo[4]: "none"
  uo[5]: "none"
  uo[6]: "none"
  uo[7]: "none"

  # Bidirectional pins
  uio[0]: "none"
  uio[1]: "none"
  uio[2]: "none"
  uio[3]: "none"
  uio[4]: "none"
  uio[5]: "none"
  uio[6]: "none"
  uio[7]: "none"

# Do not change!
yaml_version: 6