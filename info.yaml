# Tiny Tapeout project information
project:
  title:        "My First Blink LED"      # Project title
  author:       "thearith"      # Your name
  discord:      ""      # Your discord username (optional)
  description:  "A simple LED blinker using a 24-bit counter"      
  language:     "Verilog" 
  clock_hz:     10000000       # Clock frequency in Hz

  # How many tiles your design occupies? 
  tiles: "1x1"          

  # Your top module name must match your Verilog module
  top_module:  "tt_um_example"
  
  # List your project's source files here
  source_files:        
    - "project.v"

  # ផ្នែកខាងក្រោមនេះសំខាន់សម្រាប់ឱ្យ Docs បៃតង
  how_it_works: "The project uses a 24-bit counter to divide the clock frequency and toggle an LED."
  how_to_test:  "Apply power and clock. Observe the LED blinking on the first output pin."

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "reset"
  ui[1]: "none"
  ui[2]: "none"
  ui[3]: "none"
  ui[4]: "none"
  ui[5]: "none"
  ui[6]: "none"
  ui[7]: "none"

  # Outputs
  uo[0]: "led"
  uo[1]: "none"
  uo[2]: "none"
  uo[3]: "none"
  uo[4]: "none"
  uo[5]: "none"
  uo[6]: "none"
  uo[7]: "none"

  # Bidirectional pins
  uio[0]: "none"
  uio[1]: "none"
  uio[2]: "none"
  uio[3]: "none"
  uio[4]: "none"
  uio[5]: "none"
  uio[6]: "none"
  uio[7]: "none"

